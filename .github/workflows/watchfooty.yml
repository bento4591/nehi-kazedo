name: Watchfooty Updater (Playwright + Proxy)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests playwright bs4
          playwright install chromium

      - name: Run Scraper
        run: python update_watchfooty.py

      - name: Commit & Push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if [ -f Watchfooty_BoneTV.m3u8 ]; then
            git add Watchfooty_BoneTV.m3u8
          else
            echo "File M3U8 tidak ditemukan. Skip commit."
            exit 0
          fi

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan, skip commit."
            exit 0
          fi

          git commit -m "Update Watchfooty (Playwright Proxy) [skip ci]"

          if ! git push origin main; then
            git stash
            git pull --rebase origin main
            git stash pop
            git add Watchfooty_BoneTV.m3u8 || true
            git commit -m "Update Watchfooty (rebased) [skip ci]" || true
            git push origin main
          fi
