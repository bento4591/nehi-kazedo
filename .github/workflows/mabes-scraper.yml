name: MABES Scraper (StreamsGate, FootyStream, EmbedHD & Streamhub)

on:
  workflow_dispatch: # Pemicu manual khusus dari Cron Job pihak ketiga Kapten

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          echo "Memasang amunisi gabungan..."
          pip install httpx beautifulsoup4 requests playwright selectolax tzdata
          python -m playwright install --with-deps chromium

      - name: Run StreamsGate Scraper
        run: |
          echo "Memulai eksekusi StreamsGate..."
          python streamsgate.py || echo "⚠️ Peringatan: StreamsGate mengalami kendala, melanjutkan ke target berikutnya..."

      - name: Run EmbedHD Scraper
        run: |
          echo "Memulai eksekusi EmbedHD..."
          python embedhd.py || echo "⚠️ Peringatan: EmbedHD mengalami kendala, tetap melanjutkan proses..."

      - name: Run FootyStream Scraper
        run: |
          echo "Memulai eksekusi Tank FootyStream..."
          python footystream.py || echo "⚠️ Peringatan: FootyStream mengalami kendala, tetap melanjutkan proses..."

      - name: Run Streamhub Scraper
        run: |
          echo "Memulai eksekusi Streamhub (Fast Async HTTP)..."
          python streamhub.py || echo "⚠️ Peringatan: Streamhub mengalami kendala, tetap melanjutkan proses..."

      - name: Commit & Push safely
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          FILE_ADDED=0

          if [ -f streamsgate.m3u8 ]; then
            git add streamsgate.m3u8
            FILE_ADDED=1
          fi

          if [ -f FootyStream_BoneTV.m3u8 ]; then
            git add FootyStream_BoneTV.m3u8
            FILE_ADDED=1
          fi

          if [ -f embedhd.m3u8 ]; then
            git add embedhd.m3u8
            FILE_ADDED=1
          fi

          if [ -f streamhub.m3u8 ]; then
            git add streamhub.m3u8
            FILE_ADDED=1
          fi
          
          # Mengamankan seluruh file database cache agar tidak scrape ulang dari nol
          git add *.json || true

          if [ $FILE_ADDED -eq 0 ]; then
            echo "Tidak ada file M3U8 yang dihasilkan sama sekali. Skip commit."
            exit 0
          fi

          if git diff --cached --quiet; then
            echo "Tidak ada jadwal baru atau perubahan, skip commit."
            exit 0
          fi

          git commit -m "Update M3U8 playlists (MABES ENTERPRISE V12.1) [skip ci]"

          # Logika anti-tabrakan (rebase) andalan MABES ENTERPRISE
          if ! git push origin main; then
            echo "Push tertahan — melakukan rebase aman..."
            git pull --rebase origin main
            git push origin main
          fi
