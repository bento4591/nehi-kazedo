name: FootyStream Scraper

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape-footystream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests playwright selectolax tzdata
          python -m playwright install --with-deps chromium

      - name: Run Scraper FootyStream
        run: |
          python footystream.py

      - name: Commit & Push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add FootyStream_BoneTV.m3u8 || true
          git commit -m "Update FootyStream playlist [skip ci]" || true
          git push origin main || true
