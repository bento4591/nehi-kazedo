name: Scheduled M3U8 Scraper (Hybrid)

on:
  schedule:
  workflow_dispatch: 

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright & Dependencies
        run: |
          npm install playwright --no-save
          npx playwright install chromium --with-deps

      - name: Run Scraper Engine
        run: node scraper.js

      - name: Commit and Push Data (M3U + JSON)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # LOGIKA PRO 100%: Mesin mengecek keberadaan file, lalu mengangkut KEDUANYA!
          if [ -f playlist.m3u ] || [ -f database.json ]; then
            git add playlist.m3u database.json
            git commit -m "Auto-Update: M3U & Database [$(date)]" || echo "No changes to commit"
            
            # Sistem penyapu sampah agar mesin tetap bersih (menghindari error rebase)
            git stash || true
            
            git pull --rebase origin main
            git push
          fi
