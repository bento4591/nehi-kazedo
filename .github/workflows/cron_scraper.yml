name: Scheduled M3U8 Scraper (Hybrid)

on:
  workflow_dispatch: # Wajib ada untuk trigger dari cron-job.org
  # schedule: # Bagian ini dimatikan karena Anda menggunakan pihak ketiga (cron-job.org)

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    
    # Memberikan izin menulis agar bot bisa melakukan Push
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright & Dependencies
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Scraper Engine
        run: node scraper.js

      - name: Commit and Push Data (M3U + JSON)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Cek apakah file ada sebelum di-add untuk menghindari error 'pathspec'
          if [ -f playlist.m3u ]; then git add playlist.m3u; fi
          if [ -f database.json ]; then git add database.json; fi
          
          # Cek apakah ada perubahan yang perlu di-commit
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan data."
            exit 0
          fi

          git commit -m "Auto-Update: M3U & Database [$(date +'%Y-%m-%d %H:%M:%S') WITA]"
          
          # Logika Push yang lebih aman (Safe Rebase)
          if ! git push origin main; then
            echo "Push gagal, mencoba rebase..."
            git pull --rebase origin main
            git push origin main
          fi
